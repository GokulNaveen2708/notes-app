<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notes</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; }
    textarea { width: 100%; height: 80px; padding: 8px; font-size: 1rem; box-sizing: border-box; }
    button { margin-top: 8px; padding: 8px 16px; font-size: 1rem; cursor: pointer; }
    #error { color: #c0392b; min-height: 1.2em; margin-top: 8px; }
    ul { list-style: none; padding: 0; margin-top: 24px; }
    li { border: 10px solid #ddd; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; }
    li small { color: #888; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>My Notes</h1>

  <textarea id="content" placeholder="Type a note..."></textarea>
  <button id="saveBtn">Save</button>
  <div id="error"></div>

  <ul id="list"></ul>

  <script>
    const api = "/notes";

    async function loadNotes() {
      const res = await fetch(api);
      const notes = await res.json();
      const list = document.getElementById("list");
      list.innerHTML = "";
      for (const note of notes) {
        const li = document.createElement("li");
        const when = new Date(note.created_at).toLocaleString();
        li.textContent = note.content;
        const time = document.createElement("small");
        time.textContent = when;
        li.appendChild(time);
        list.appendChild(li);
      }
    }

    async function saveNote() {
      const box = document.getElementById("content");
      const errorEl = document.getElementById("error");
      errorEl.textContent = "";

      const res = await fetch(api, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: box.value }),
      });

      if (res.ok) {
        box.value = "";
        loadNotes();
      } else {
        errorEl.textContent = "Could not save \u2014 note must be 1 to 1000 characters.";
      }
    }

    document.getElementById("saveBtn").addEventListener("click", saveNote);
    loadNotes();
  </script>
</body>
</html>
